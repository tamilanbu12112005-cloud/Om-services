    <!-- Custom CSS -->

</head>

<body>
    <!-- Ultimate Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container-fluid">
            <!-- Logo -->
            <a class="navbar-brand" href="index.html">
                <img src="logo-removebg-preview.png" alt="OM Service Logo">
            </a>

            <!-- Mobile Toggler -->
            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse"
                data-bs-target="#ultimateNav">
                <i class="fas fa-bars text-gold fs-2"></i>
            </button>

            <!-- Menu -->
            <div class="collapse navbar-collapse" id="ultimateNav">
                <div class="nav-menu-group mx-auto">
                    <a class="nav-link home-btn" href="index.html">
                        <i class="fas fa-home"></i> HOME
                    </a>
                    <a class="nav-link" href="contact.html">
                        <i class="fas fa-phone-alt"></i> CONTACT
                    </a>
                    <a class="nav-link" href="about.html">
                        <i class="fas fa-info-circle"></i> ABOUT US
                    </a>
                    <a class="nav-link active" href="reviews.html">
                        <i class="fas fa-star"></i> REVIEWS
                    </a>
                    <a class="nav-link" href="offers.html">
                        <i class="fas fa-tags"></i> OFFERS
                    </a>
                    <a class="nav-link" href="#" onclick="showCardPopup(); return false;">
                        <i class="fas fa-id-card"></i> VISITING CARD
                    </a>
                    <a class="nav-link" href="user-dashboard.html">
                        <i class="fas fa-tachometer-alt"></i> DASHBOARD
                    </a>
                </div>

                <!-- Right Side -->
                <div class="d-flex align-items-center justify-content-center gap-3 mt-3 mt-lg-0">
                    <div id="user-button" style="color: white;"></div>
                    <a href="join.html" class="join-us-btn">
                        JOIN US
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-5 pt-5 mb-5 ps-3 pe-3">

        <div class="text-center mt-4 mb-5">
            <h1 class="page-title text-gold mb-3">Customer Stories</h1>
            <p class="text-white-50">See what our improved clients have to say about us.</p>
        </div>

        <div class="row g-4" id="reviews-container">
            <!-- Loading State -->
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-gold" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-3 text-white-50">Loading reviews...</p>
            </div>
        </div>
    </div>

    <script>
        async function loadReviews() {
            try {
                const res = await fetch('/api/reviews');
                const reviews = await res.json();
                const container = document.getElementById('reviews-container');

                if (reviews.length === 0) {
                    container.innerHTML = `
                         <div class="col-12 text-center py-5">
                            <i class="bi bi-chat-quote text-gold fs-1 mb-3"></i>
                            <h3 class="text-white">No reviews yet</h3>
                            <p class="text-white-50">Be the first to share your experience!</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = reviews.map(r => `
                    <div class="col-md-6 col-lg-4">
                        <div class="glass-panel h-100 p-4 hover-lift">
                            <div class="d-flex justify-content-between align-items-start mb-3">
                                <div>
                                    <h5 class="text-gold fw-bold mb-1">${r.name}</h5>
                                    <span class="badge bg-light text-dark bg-opacity-10 text-white border border-light border-opacity-25">${r.serviceType}</span>
                                </div>
                                <div class="text-gold">
                                    ${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}
                                </div>
                            </div>
                            <p class="text-white-50 fst-italic mb-3">"${r.comment}"</p>
                             <div class="border-top border-white border-opacity-10 pt-3 mt-auto">
                                <small class="text-white-50">
                                    <i class="bi bi-calendar3 me-1"></i>
                                    ${new Date(r.createdAt).toLocaleDateString('en-US', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                })}
                                </small>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                console.error('Error loading reviews:', err);
                document.getElementById('reviews-container').innerHTML = `
                    <div class="col-12 text-center">
                        <p class="text-danger">Failed to load reviews. Please try again later.</p>
                    </div>
                `;
            }
        }

        window.addEventListener('load', loadReviews);
    </script>
    <!-- Login Popup (Premium Design) -->
    <div id="loginPopup">
        <div class="popup-content glass-login" role="dialog" aria-modal="true" aria-labelledby="loginTitle">
            <span class="close-btn" aria-label="Close login popup" role="button" tabindex="0" onclick="hideLoginPopup()">
                <i class="fas fa-times"></i>
            </span>
            <div class="login-header mb-4">
                <div class="login-icon-circle">
                    <i class="fas fa-user-shield"></i>
                </div>
                <h2 id="loginTitle" class="text-gold mt-3">Admin Portal</h2>
                <p class="text-white-50 small">Secure Access Only</p>
            </div>
            <form id="loginForm" onsubmit="return validateLogin(event)">
                <div class="input-group-custom mb-4">
                    <span class="input-icon"><i class="fas fa-user-astronaut"></i></span>
                    <input type="text" class="form-control-glass" id="userId" name="userId" placeholder="Admin ID" required autocomplete="off" />
                </div>
                <div class="input-group-custom mb-4">
                    <span class="input-icon"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control-glass" id="password" name="password" placeholder="Password" required autocomplete="off" />
                </div>
                <button type="submit" class="btn-login-glow w-100">
                    <span class="btn-text">Unlock Dashboard</span>
                    <i class="fas fa-arrow-right ms-2"></i>
                </button>
                <div class="error-msg mt-3 text-center small" id="loginError"></div>
            </form>
        </div>
    </div>

    <!-- Card Popup -->
    <div id="cardPopup">
        <div class="popup-content" role="dialog" aria-modal="true" aria-labelledby="cardTitle">
            <span class="close-btn" aria-label="Close visiting card popup" role="button" tabindex="0" onclick="hideCardPopup()">&times;</span>
            <h2 id="cardTitle">Visiting Card</h2>
            <div class="card-images row g-3 mb-4">
                <div class="col-6">
                    <img src="1.png" alt="Front of the visiting card" onclick="openImageViewer(this.src)">
                </div>
                <div class="col-6">
                    <img src="2.png" alt="Back of the visiting card" onclick="openImageViewer(this.src)">
                </div>
            </div>
            <a href="visiting-card.zip" download class="btn-download">Download</a>
        </div>
    </div>

    <!-- Image Viewer -->
    <div id="imageViewer">
        <span class="close-viewer-btn" onclick="closeImageViewer()">&times;</span>
        <img id="fullScreenImage" src="" alt="Full-screen view">
    </div>

    <script src="js/premium-notify.js"></script><script src="js/auth.js"></script>
</body>

</html>
